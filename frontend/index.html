<!DOCTYPE html>
<html>

<head>
    <title>ChatPDF AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📄 ChatPDF AI</h1>
        <p>Upload a PDF and chat with your documents</p>
    </div>

    <div class="upload-card">

        <input type="file" id="pdfFile">

        <button onclick="uploadPdf()">
            Upload PDF
        </button>

        <div
            id="status"
            class="status">
        </div>

    </div>

    <div
        id="chatBox"
        class="chat-box">
    </div>

    <div class="input-row">

        <input
            id="question"
            type="text"
            placeholder="Ask anything about the document..."
        >

        <button onclick="askQuestion()">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
